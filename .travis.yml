# references:
# * http://www.objc.io/issue-6/travis-ci.html
# * https://github.com/supermarin/xcpretty#usage

language: objective-c

install: swift package generate-xcodeproj

jobs:
  include:
    # macOS
    - osx_image: xcode10.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=macOS
    - osx_image: xcode11.4
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=macOS
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=macOS
    # iOS
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=iOS Simulator,OS=10.3,name=iPhone X
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=iOS Simulator,OS=11.0,name=iPhone X
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=iOS Simulator,OS=12.0,name=iPhone X
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=iOS Simulator,OS=13.0,name=iPhone X
    - osx_image: xcode12.2
      xcode_project: Robin.xcodeproj
      xcode_scheme: Robin-Package
      xcode_destination: platform=iOS Simulator,OS=14.0,name=iPhone X
